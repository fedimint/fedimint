regtest=1
fallbackfee=0.0004
txindex={tx_index}
server=1
rpcuser=bitcoin
rpcpassword=bitcoin
zmqpubrawblock=tcp://127.0.0.1:{zmq_pub_raw_block}
zmqpubrawtx=tcp://127.0.0.1:{zmq_pub_raw_tx}
rpcworkqueue=1024
rpcthreads=64
blocknotify=pid=$(cat {esplora_pid_file} 2>/dev/null); if [ -n "$pid" ]; then kill -USR1 "$pid" >/dev/null 2>&1; fi; true
# workaround: https://github.com/lightningnetwork/lnd/issues/9053#issuecomment-2408658986
deprecatedrpc=warnings
[regtest]
port={p2p_port}
bind=[::1]:{p2p_port}
rpcport={rpc_port}
rpcbind=[:1]:{rpc_port}
