# Example audit config file
#
# It may be located in the user home (`~/.cargo/audit.toml`) or in the project
# root (`.cargo/audit.toml`).
#
# All of the options which can be passed via CLI arguments can also be
# permanently specified in this file.
#
#
# See the full example in: https://raw.githubusercontent.com/rustsec/rustsec/main/cargo-audit/audit.toml.example
[advisories]
ignore = [
  # `rsa` Marvin timing sidechannel; no fix available upstream
  "RUSTSEC-2023-0071",
  # `atomic-polyfill` unmaintained; transitive, waiting for the update chain to reach iroh
  "RUSTSEC-2023-0089",
  # `proc-macro-error` unmaintained; transitive
  "RUSTSEC-2024-0370",
  # `instant` unmaintained; transitive
  "RUSTSEC-2024-0384",
  # `derivative` unmaintained; transitive
  "RUSTSEC-2024-0388",
  # `paste` unmaintained; transitive
  "RUSTSEC-2024-0436",
  # `rustls-pemfile` 1.x unmaintained; transitive via reqwest 0.11 (ldk-node chain)
  "RUSTSEC-2025-0134",
  # `bincode` 1.x/2.x unmaintained; transitive only
  "RUSTSEC-2025-0141",
  # `lru` IterMut stacked-borrows unsoundness; theoretical, transitive
  "RUSTSEC-2026-0002",
  # `keccak` unsoundness is in opt-in ARMv8 asm backend we do not enable
  "RUSTSEC-2026-0012",
  # rustls-webpki CRL matching logic; 0.102.x has no backport, pinned via fedimint-ldk-node/iroh 0.35.0
  "RUSTSEC-2026-0049",
  # rand unsoundness requires a custom logger that re-enters rand::rng()/thread_rng(), which we do not define
  "RUSTSEC-2026-0097",
  # rustls-webpki name-constraints issues remain in 0.101.x/0.102.x; pinned there via fedimint-ldk-node/iroh 0.35.0
  "RUSTSEC-2026-0098",
  "RUSTSEC-2026-0099",
  # rustls-webpki CRL parsing panic; fixed in 0.103.13 (updated). 0.101.x/0.102.x have no backport and remain pinned via fedimint-ldk-node/iroh 0.35.0
  "RUSTSEC-2026-0104",
  # hickory-proto DNSSEC NSEC3 closest-encloser unbounded loop; only reachable with DNSSEC validation (dnssec-ring/dnssec-aws-lc-rs), which we do not enable. Fix is in 0.26.1; transitive via iroh, can't update yet.
  "RUSTSEC-2026-0118",
  # hickory-proto O(n²) name compression on message encoding; only affects encoding large DNS messages, which we do not do (we are a resolver consumer). Fix is in 0.26.1; transitive via iroh, can't update yet.
  "RUSTSEC-2026-0119",
  # quick-xml duplicate-attribute and namespace DoS; transitive through
  # netdev -> plist. Updated plist to the newest compatible release, but plist
  # still pins quick-xml to ^0.39 and the advisory requires >=0.41.0.
  "RUSTSEC-2026-0194",
  "RUSTSEC-2026-0195",
]

[output]
quiet = true
show_tree = false
