name: "Nix flake update"

on:
  schedule:
    # Weekly on Saturday at 06:00 UTC, aligned with dependabot schedule
    - cron: '0 6 * * 6'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions: {}

jobs:
  update-flake-lock:
    if: github.repository == 'fedimint/fedimint'
    name: Update Nix flake inputs
    runs-on: [self-hosted, linux, x64]
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: DeterminateSystems/update-flake-lock@834c491b2ece4de0bbd00d85214bb5e83b4da5c6 # v28
        with:
          # Only update inputs that are NOT pinned to a specific rev.
          # Pinned inputs have intentional version locks:
          #   nixpkgs-unstable - temporary workaround (nixpkgs#459738)
          #   fenix            - pinned due to nix-community/fenix#235
          #   flakebox         - pinned to specific rev by maintainer
          #   cargo-deluxe     - pinned to specific rev
          #   bundlers         - pinned to specific rev
          #   advisory-db      - already updated in daily.yml
          inputs: nixpkgs flake-utils wild
          pr-title: "chore(nix): flake.lock update"
          pr-labels: |
            dependencies
            nix
          pr-body: |
            Automated weekly update of unpinned Nix flake inputs.

            Pinned inputs are intentionally excluded — see comments in `flake.nix`.

            ```
            {{ env.GIT_COMMIT_MESSAGE }}
            ```
