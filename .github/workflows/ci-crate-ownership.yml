on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

name: Crate ownership check

permissions:
  contents: read

jobs:
  check-ownership:
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/pin-nix-flake-inputs
      - name: Check crates.io ownership
        run: |
          nix develop -c ./scripts/ci/check-crate-ownership.sh

  notifications:
    if: always() && github.repository == 'fedimint/fedimint'
    name: "Notifications"
    timeout-minutes: 1
    runs-on: [self-hosted, linux, x64]
    needs: [ check-ownership ]

    steps:
    - name: Discord notifications on failure
      if: ${{ always() && contains(needs.*.result, 'failure') }}
      uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708 # v1.16.0
      with:
        webhook: ${{ secrets.DISCORD_WEBHOOK }}
        status: failure
