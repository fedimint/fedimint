name: 'check reminders'

on:
  schedule:
    # Run every hour at the 10th minute
    - cron: '10 * * * *'

permissions:
  issues: write
  pull-requests: write

jobs:
  reminder:
    runs-on: ubuntu-latest

    steps:
      - name: check reminders and notify
        uses: agrc/reminder-action@76a6297d144adb572b4cf6d9c0ee667f0ec6b832 # v1.0.21
